networks:
  frontend_net:
  backend_net:

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    networks:
      - backend_net

  backend:
    build: ./backend
    restart: always
    networks:
      - frontend_net
      - backend_net 
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      - db

  gateway:
      image: nginx:alpine
      networks:
        - frontend_net
      volumes:
        - ./frontend:/usr/share/nginx/html:ro
        - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      ports:
        - "80:80"
      depends_on:
        - backend
