networks:
  frontend_net:
  backend_net:

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: my_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - backend_net

  backend:
    build: ./backend
    restart: always
    networks:
      - frontend_net
      - backend_net 
    environment:
      DB_HOST: db
      DB_NAME: my_db
      DB_USER: user
      DB_PASS: password
    depends_on:
      - db

  gateway:
      image: nginx:alpine
      networks:
        - frontend_net
      volumes:
        - ./frontend:/usr/share/nginx/html:ro
        - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      ports:
        - "80:80"
      depends_on:
        - backend
